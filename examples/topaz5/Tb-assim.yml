dataset_def:
  amsr2:
    config_file: '{nedas_root}/datasets/amsr2/default.yml'
    dataset_dir: "/cluster/work/users/yingyue/amsr_tb_assim_exp/rtm_input_data/l3_data"
    coefficients_file: "/cluster/work/users/yingyue/amsr_tb_assim_exp/coefficient_files/coefficients_2021_sorted.csv"
    ow_bias_file: "/cluster/work/users/yingyue/amsr_tb_assim_exp/monthly_means_ow_bias_2021.csv"
    obs_window_min: 0
    obs_window_max: 23

use_synthetic_obs: False
z_coords_from: mean

perturb:
- variable: ['atmos_surf_press', 'atmos_surf_velocity']
  model_src: 'topaz.v5'
  type: 'gaussian,press_wind_relate,scale_wind'
  amp: [316., 1.58]
  hcorr: [2.5e5, 2.5e5]
  tcorr: [48, 48]
- variable: 'atmos_surf_temp'
  model_src: 'topaz.v5'
  type: 'gaussian'
  amp: 10
  hcorr: 2.5e5
  tcorr: 48
- variable: 'atmos_column_vapor'
  model_src: 'topaz.v5'
  type: 'gaussian'
  amp: 5
  hcorr: 2.5e5
  tcorr: 48
  bounds: [0, inf]
- variable: 'atmos_column_liquid'
  model_src: 'topaz.v5'
  type: 'gaussian'
  amp: 0.05
  hcorr: 2.5e5
  tcorr: 48
  bounds: [0, inf]

scheme: filter

niter: 1
iter:
resolution_level: [0]
character_length: [1e6]
localize_scale_fac: [1]
obs_err_scale_fac: [1]

assimilator_def:
  type: TopazDEnKF
  config_file:

updator_def:
  type: additive
  config_file:

covariance_def:
  type: ensemble
  config_file:

inflation_def:
  type: post,multiplicative
  adaptive: False
  coef: 1.01

localization_def:
  horizontal:
    type: gaspari_cohn
  vertical:
    type: gaspari_cohn
  temporal:
    type: exponential

transform_def:
- type: scale_bandpass
  decompose_obs: False

diag:
# convert seaice conc output to nc files for ICECAP diagnostics
- method: 'misc.convert_output'
  config_file:
  grid_def:
  model_src: 'topaz.v5'
  time_start: '202107050000'
  forecast_hours: 169
  dt_hours: 168
  variables: ['ocean_temp', 'ocean_saln', 'ocean_velocity', 'ocean_layer_thick', 'seaice_conc', 'seaice_thick', 'seaice_velocity']
  file: '{work_dir}/output/topaz5_mem{member:03}_b{time:%Y-%m-%d}T{time:%H}.nc'

